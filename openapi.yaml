openapi: 3.0.3
info:
  title: Linkly API
  description: |
    The Linkly API lets you programmatically access events and leads captured on your account.

    ## Authentication

    All requests must include your API key in the `X-Api-Key` header:

    ```
    X-Api-Key: your_api_key_here
    ```

    You can generate an API key from your Linkly dashboard under **Settings → API Keys**.

    ## Base URL

    ```
    https://xg2h-ynzv-owbr.p7.xano.io/api:7o7c27ez
    ```

    ## Date format

    All dates are returned as `DD/MM/YYYY` strings.
  version: "1.0.0"
  contact:
    name: Linkly Support
    url: https://linkly.events

servers:
  - url: https://xg2h-ynzv-owbr.p7.xano.io/api:7o7c27ez
    description: Production

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key
      description: Your Linkly API key. Generate one in Settings → API Keys.

  schemas:
    Event:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        created_at:
          type: string
          description: Creation date in DD/MM/YYYY format
          example: "01/06/2025"
        evt_name:
          type: string
          nullable: true
          example: "SaaStr Annual 2025"
        evt_status:
          type: string
          nullable: true
          enum: [UPCOMING, ONGOING, COMPLETED, ARCHIVED]
          example: "UPCOMING"
        evt_start_date:
          type: string
          nullable: true
          description: Event start date in DD/MM/YYYY format
          example: "10/06/2025"
        evt_end_date:
          type: string
          nullable: true
          description: Event end date in DD/MM/YYYY format
          example: "12/06/2025"
        evt_scan_goal:
          type: integer
          nullable: true
          description: Target number of leads to capture
          example: 100
        evt_budget:
          type: number
          nullable: true
          description: Event budget
          example: 5000
        follow_up_email:
          type: string
          nullable: true
          enum: [ENABLED, DISABLED]
          description: Whether a follow-up email is configured for this event
          example: "ENABLED"
        follow_up_email_subject:
          type: string
          nullable: true
          example: "Great meeting you at SaaStr!"
        follow_up_email_message:
          type: string
          nullable: true
          example: "Hi {{first_name}}, it was great connecting with you..."
        follow_up_email_cc:
          type: array
          nullable: true
          description: CC email addresses for follow-up emails
          items:
            type: string
            format: email
          example: ["team@acme.com"]
        follow_up_email_delay:
          type: integer
          nullable: true
          description: Delay in hours before the follow-up email is sent
          example: 24
        qualification_form:
          type: string
          nullable: true
          enum: [ENABLED, DISABLED]
          description: Whether a qualification form is configured for this event
          example: "ENABLED"
        team_members:
          type: array
          nullable: true
          description: Full names of active team members assigned to this event
          items:
            type: string
          example: ["Alice Smith", "Bob Jones"]
        created_by:
          type: string
          nullable: true
          description: Full name of the user who created the event
          example: "Alice Smith"

    LeadListItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
        created_at:
          type: string
          description: Capture date in DD/MM/YYYY format
          example: "10/06/2025"
        lead_first_name:
          type: string
          nullable: true
          example: "John"
        lead_last_name:
          type: string
          nullable: true
          example: "Doe"
        lead_status:
          type: string
          nullable: true
          enum: [NEW, QUALIFIED, PROPOSAL, WON, LOST]
          example: "NEW"
        lead_tags:
          type: array
          nullable: true
          description: List of tags assigned to this lead
          items:
            type: string
          example: ["enterprise", "demo-requested"]
        created_by:
          type: string
          nullable: true
          description: Full name of the team member who captured this lead
          example: "Alice Smith"
        event:
          type: object
          nullable: true
          description: The event this lead was captured at
          properties:
            evt_name:
              type: string
              example: "SaaStr Annual 2025"
            evt_status:
              type: string
              enum: [UPCOMING, ONGOING, COMPLETED, ARCHIVED]
              example: "UPCOMING"
            evt_start_date:
              type: string
              nullable: true
              example: "10/06/2025"
            evt_end_date:
              type: string
              nullable: true
              example: "12/06/2025"

    Lead:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
        created_at:
          type: string
          description: Capture date in DD/MM/YYYY format
          example: "10/06/2025"
        lead_first_name:
          type: string
          nullable: true
          example: "John"
        lead_last_name:
          type: string
          nullable: true
          example: "Doe"
        lead_company_name:
          type: string
          nullable: true
          example: "Acme Corp"
        lead_company_industry:
          type: string
          nullable: true
          example: "SaaS"
        lead_company_size:
          type: string
          nullable: true
          example: "51-200"
        lead_company_headquarters:
          type: string
          nullable: true
          example: "San Francisco, CA"
        lead_company_annual_revenue:
          type: string
          nullable: true
          example: "$5M-$10M"
        lead_company_website:
          type: string
          nullable: true
          example: "https://acme.com"
        lead_job_title:
          type: string
          nullable: true
          example: "VP of Sales"
        lead_email:
          type: string
          nullable: true
          example: "john.doe@acme.com"
        lead_phone:
          type: string
          nullable: true
          example: "+1 415 555 0100"
        lead_location:
          type: string
          nullable: true
          example: "San Francisco, CA"
        lead_linkedin_url:
          type: string
          nullable: true
          example: "https://linkedin.com/in/johndoe"
        lead_status:
          type: string
          nullable: true
          enum: [NEW, QUALIFIED, PROPOSAL, WON, LOST]
          example: "NEW"
        lead_capture_method:
          type: string
          nullable: true
          description: How the lead was captured
          enum: [BADGE_SCAN, BUSINESS_CARD, FORM, QR_CODE, IMPORT]
          example: "BADGE_SCAN"
        lead_tags:
          type: array
          nullable: true
          description: List of tags assigned to this lead
          items:
            type: string
          example: ["enterprise", "demo-requested"]
        lead_notes:
          type: string
          nullable: true
          example: "Interested in the enterprise plan. Follow up next week."
        lead_value:
          type: number
          nullable: true
          description: Estimated deal value
          example: 12000
        lead_ai_summary:
          type: string
          nullable: true
          description: AI-generated enrichment summary
          example: "John Doe is VP of Sales at Acme Corp, a Series B SaaS company..."
        notes_last_updated_by:
          type: string
          nullable: true
          description: Full name of the user who last updated the notes
          example: "Alice Smith"
        notes_last_updated_at:
          type: string
          nullable: true
          description: Date notes were last updated, in DD/MM/YYYY format
          example: "11/06/2025"
        lead_linkedin_image:
          type: object
          nullable: true
          properties:
            url:
              type: string
              example: "https://storage.example.com/images/linkedin_101.jpg"
        lead_scanned_image:
          type: object
          nullable: true
          properties:
            url:
              type: string
              example: "https://storage.example.com/images/scan_101.jpg"
        event:
          type: object
          nullable: true
          description: The event this lead was captured at
          properties:
            id:
              type: string
              format: uuid
              example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
            evt_name:
              type: string
              example: "SaaStr Annual 2025"
            evt_status:
              type: string
              enum: [UPCOMING, ONGOING, COMPLETED, ARCHIVED]
              example: "UPCOMING"
            evt_start_date:
              type: string
              nullable: true
              example: "10/06/2025"
            evt_end_date:
              type: string
              nullable: true
              example: "12/06/2025"
        created_by:
          type: string
          nullable: true
          description: Full name of the team member who captured this lead
          example: "Alice Smith"

    Error:
      type: object
      properties:
        message:
          type: string
          example: "Invalid or inactive API key."

security:
  - ApiKeyAuth: []

paths:
  /get_events:
    get:
      summary: List events
      description: Returns all events for your company, sorted by creation date descending.
      operationId: getEvents
      tags:
        - Events
      responses:
        "200":
          description: A list of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
              example:
                - id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  created_at: "01/06/2025"
                  evt_name: "SaaStr Annual 2025"
                  evt_status: "UPCOMING"
                  evt_start_date: "10/06/2025"
                  evt_end_date: "12/06/2025"
                  evt_scan_goal: 100
                  evt_budget: 5000
                  follow_up_email: "ENABLED"
                  follow_up_email_subject: "Great meeting you at SaaStr!"
                  follow_up_email_message: "Hi {{first_name}}, it was great connecting..."
                  follow_up_email_cc: ["team@acme.com"]
                  follow_up_email_delay: 24
                  qualification_form: "ENABLED"
                  team_members: ["Alice Smith", "Bob Jones"]
                  created_by: "Alice Smith"
        "400":
          description: API key is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                message: "API key is required."
        "401":
          description: Invalid or inactive API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                message: "Invalid or inactive API key."

  /get_leads:
    get:
      summary: List leads
      description: Returns all leads for your company, sorted by creation date descending. Includes the associated event and the team member who captured the lead.
      operationId: getLeads
      tags:
        - Leads
      responses:
        "200":
          description: A list of leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeadListItem"
              example:
                - id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                  created_at: "10/06/2025"
                  lead_first_name: "John"
                  lead_last_name: "Doe"
                  lead_status: "NEW"
                  lead_tags: ["enterprise", "demo-requested"]
                  created_by: "Alice Smith"
                  event:
                    evt_name: "SaaStr Annual 2025"
                    evt_status: "UPCOMING"
                    evt_start_date: "10/06/2025"
                    evt_end_date: "12/06/2025"
        "400":
          description: API key is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                message: "API key is required."
        "401":
          description: Invalid or inactive API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                message: "Invalid or inactive API key."

  /get_lead:
    get:
      summary: Get a lead
      description: |
        Returns the full profile of a single lead, including enrichment data, qualification form answers, and linked event.

        Qualification form answers are returned as dynamic fields on the root object, keyed by the question label. For example: `"Budget range": "€10k-€50k"`.
      operationId: getLead
      tags:
        - Leads
      parameters:
        - name: lead_id
          in: query
          required: true
          description: The ID of the lead to retrieve
          schema:
            type: string
            format: uuid
            example: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
      responses:
        "200":
          description: The lead object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
              example:
                id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                created_at: "10/06/2025"
                lead_first_name: "John"
                lead_last_name: "Doe"
                lead_company_name: "Acme Corp"
                lead_company_industry: "SaaS"
                lead_company_size: "51-200"
                lead_company_headquarters: "San Francisco, CA"
                lead_company_annual_revenue: "$5M-$10M"
                lead_company_website: "https://acme.com"
                lead_job_title: "VP of Sales"
                lead_email: "john.doe@acme.com"
                lead_phone: "+1 415 555 0100"
                lead_location: "San Francisco, CA"
                lead_linkedin_url: "https://linkedin.com/in/johndoe"
                lead_status: "NEW"
                lead_capture_method: "BADGE_SCAN"
                lead_tags: ["enterprise", "demo-requested"]
                lead_notes: "Interested in the enterprise plan."
                lead_value: 12000
                lead_ai_summary: "John Doe is VP of Sales at Acme Corp, a Series B SaaS company..."
                notes_last_updated_by: "Alice Smith"
                notes_last_updated_at: "11/06/2025"
                lead_linkedin_image:
                  url: "https://storage.example.com/images/linkedin_101.jpg"
                lead_scanned_image: null
                event:
                  id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  evt_name: "SaaStr Annual 2025"
                  evt_status: "UPCOMING"
                  evt_start_date: "10/06/2025"
                  evt_end_date: "12/06/2025"
                created_by: "Alice Smith"
                "Budget range": "€10k-€50k"
                "Main interest": "Lead capture"
        "400":
          description: API key is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                message: "API key is required."
        "401":
          description: Invalid or inactive API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                message: "Invalid or inactive API key."
        "500":
          description: Lead does not belong to your organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                message: "Lead does not belong to your organization."
